<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINGLIYY.SERVER — 仪表盘</title>
<meta name="description" content="LingServer Dashboard — Data-Dense Server Operations Panel">
<meta name="color-scheme" content="dark light">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111827'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%2322c55e'/%3E%3C/svg%3E">

<!-- Fonts — async load so blocked CDN doesn't stall page render in China -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

<!-- Design System -->
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/themes/dark.css">
<link rel="stylesheet" href="css/themes/light.css">

<!-- Chart.js CDN (deferred — not needed until overview tab opens) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

<!-- xterm.js loaded lazily in js/tabs/terminal.js -->
</head>
<body>

<a href="#main-content" class="skip-link">跳到主要内容</a>

<div class="scene">

  <!-- Theme ripple ring -->
  <div class="theme-reveal theme-reveal--dark" id="theme-reveal"></div>

  <!-- L0: Image background (dual dark/light) -->
  <div class="bg-image-wrap">
    <img class="bg-img-dark" src="dame/登录页/bg-image.jpg" alt="" aria-hidden="true" decoding="async">
    <img class="bg-img-light" src="dame/登录页/bg-image-light.png" alt="" aria-hidden="true" decoding="async">
  </div>
  <div class="bg-image-glow"></div>

  <!-- L1: SVG code background -->
  <svg class="code-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- L2: Canvas ribbons -->
  <canvas class="float-canvas" id="ribbon-canvas" aria-hidden="true" role="presentation"></canvas>

  <!-- L3: Ambient blobs -->
  <div class="blob blob--blue"></div>
  <div class="blob blob--green"></div>
  <div class="blob blob--purple"></div>

  <!-- L4: Grid overlay -->
  <div class="grid-overlay"></div>

  <!-- UI: App shell -->
  <div class="app"></div>

  <!-- Control bar (debug panel) -->
  <div class="ctrl-bar hidden" id="debug-panel">
    <span class="ctrl-group">
      <span class="ctrl-arrows-row">
        <button class="ctrl-arrow" id="ctrl-img-prev" aria-label="上一张图片" title="上一张">◂</button>
        <button class="ctrl-arrow" id="ctrl-img-next" aria-label="下一张图片" title="下一张">▸</button>
      </span>
      <button class="ctrl-chip active" id="ctrl-img" aria-label="切换图片背景" title="图片背景">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span class="ctrl-img-label"></span>
      </button>
    </span>
    <span class="ctrl-sep"></span>
    <button class="ctrl-chip active" id="ctrl-bg" aria-label="代码背景" title="代码背景">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </button>
    <button class="ctrl-chip active" id="ctrl-ribbons" aria-label="代码飘带" title="代码飘带">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </button>
    <button class="ctrl-chip active" id="ctrl-blobs" aria-label="光晕效果" title="光晕效果">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 015 18.66M12 2a10 10 0 00-5 18.66"/></svg>
    </button>
    <button class="ctrl-chip active" id="ctrl-grid" aria-label="网格" title="网格">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <span class="ctrl-sep"></span>
    <button class="ctrl-chip" id="ctrl-light" aria-label="切换浅色主题" title="浅色主题">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <span class="ctrl-sep"></span>
    <button class="ctrl-chip ctrl-toggle" id="ctrl-hide" aria-label="隐藏控制栏" title="隐藏">▲</button>
  </div>
  <button class="debug-restore visible" id="debug-restore" aria-label="显示控制栏" title="控制栏">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
