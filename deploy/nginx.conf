# LingServer Dashboard — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/ling-server-dashboard
# Enable:   ln -s /etc/nginx/sites-available/ling-server-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name linglician.duckdns.org;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name linglician.duckdns.org;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/linglician.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linglician.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (reinforced at Nginx level)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 512;
    gzip_comp_level 5;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8899;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24h for WebSocket
    }

    # Static files — serve directly from Nginx for performance
    location /css/ {
        alias /opt/ling-server-dashboard/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        alias /opt/ling-server-dashboard/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
